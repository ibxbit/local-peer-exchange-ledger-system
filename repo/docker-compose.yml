services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - instance_data:/app/instance
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/login', timeout=3)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  instance_data:
